<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista de Veículos - DudsMobiRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 style="color: var(--dark-gray);">Frota de Veículos</h3>
            <a href="veiculos-cadastro.html" class="btn btn-custom"> + Novo Veículo</a>
        </div>

        <div class="table-responsive shadow-sm bg-white rounded">
            <table class="table table-hover table-custom mb-0">
                <thead>
                    <tr>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Ano</th>
                        <th>Placa</th>
                        <th>Diária</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Chevrolet</td>
                        <td>Onix 1.0 Turbo</td>
                        <td>2023</td>
                        <td>QWD-9876</td>
                        <td>R$ 150,00</td>
                        <td><span class="badge bg-success">Disponível</span></td>
                        <td><button class="btn btn-sm btn-outline-secondary">Editar</button></td>
                    </tr>
                    <tr>
                        <td>Jeep</td>
                        <td>Renegade Sport</td>
                        <td>2022</td>
                        <td>XYZ-1234</td>
                        <td>R$ 250,00</td>
                        <td><span class="badge" style="background-color: var(--orange);">Alugado</span></td>
                        <td><button class="btn btn-sm btn-outline-secondary">Editar</button></td>
                    </tr>
                    <tr>
                        <td>Hyundai</td>
                        <td>HB20 Comfort</td>
                        <td>2024</td>
                        <td>ABC-5555</td>
                        <td>R$ 165,00</td>
                        <td><span class="badge bg-success">Disponível</span></td>
                        <td><button class="btn btn-sm btn-outline-secondary">Editar</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
