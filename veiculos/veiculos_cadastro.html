<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Veículo - DudsMobiRent</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../index.html">DudsMobiRent</a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Dashboard</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Clientes</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="../clientes/clientes_cadastro.html">Cadastrar Cliente</a></li>
                            <li><a class="dropdown-item" href="../clientes/clientes_lista.html">Listar Clientes</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Veículos</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="veiculos_cadastro.html">Cadastrar Veículo</a></li>
                            <li><a class="dropdown-item" href="veiculos_lista.html">Listar Veículos</a></li>
                        </ul>
                    </li>
                </ul>
                <button id="themeToggleBtn" class="btn btn-outline-light btn-sm ms-lg-3 mt-3 mt-lg-0" type="button">Modo Escuro</button>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="card shadow-sm border-0">
            <div class="card-header card-header-custom">
                <h4 class="mb-0">Novo Veículo</h4>
            </div>
            <div class="card-body p-4 bg-panel">
                <form id="formVeiculo" novalidate>
                    <div id="vehicleAlert" class="alert alert-success d-none" role="alert"></div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label" for="veiculoMarca">Marca</label>
                            <input type="text" id="veiculoMarca" name="marca" class="form-control" required placeholder="Ex: Chevrolet">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="veiculoModelo">Modelo</label>
                            <input type="text" id="veiculoModelo" name="modelo" class="form-control" required placeholder="Ex: Onix 1.0 Turbo">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label" for="veiculoAno">Ano</label>
                            <input type="number" id="veiculoAno" name="ano" class="form-control" required placeholder="2023">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="veiculoPlaca">Placa</label>
                            <input type="text" id="veiculoPlaca" name="placa" class="form-control" required placeholder="ABC-1234">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="veiculoDiaria">Valor da Diária (R$)</label>
                            <input type="number" id="veiculoDiaria" name="diaria" step="0.01" class="form-control" required placeholder="150.00">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label" for="veiculoStatus">Status</label>
                            <select id="veiculoStatus" name="status" class="form-select">
                                <option value="Disponível">Disponível</option>
                                <option value="Alugado">Alugado</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end">
                        <button type="reset" class="btn btn-secondary-custom me-2">Limpar</button>
                        <button type="submit" class="btn btn-custom">Salvar Veículo</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
