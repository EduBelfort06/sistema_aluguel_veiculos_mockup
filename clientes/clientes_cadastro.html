<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Cliente - DudsMobiRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../index.html">DudsMobiRent</a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Dashboard</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Clientes</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="clientes_cadastro.html">Cadastrar Cliente</a></li>
                            <li><a class="dropdown-item" href="clientes_lista.html">Listar Clientes</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Veículos</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="../veiculos/veiculos_cadastro.html">Cadastrar Veículo</a></li>
                            <li><a class="dropdown-item" href="../veiculos/veiculos_lista.html">Listar Veículos</a></li>
                        </ul>
                    </li>
                </ul>
                <button id="themeToggleBtn" class="btn btn-outline-light btn-sm ms-lg-3 mt-3 mt-lg-0" type="button">Modo Escuro</button>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="card shadow-sm border-0">
            <div class="card-header card-header-custom">
                <h4 class="mb-0">Novo Cliente</h4>
            </div>
            <div class="card-body p-4 bg-panel">
                <form id="formCliente" novalidate>
                    <div id="clientAlert" class="alert alert-success d-none" role="alert"></div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label" for="clienteNome">Nome Completo</label>
                            <input type="text" id="clienteNome" name="nome" class="form-control" required placeholder="Ex: João da Silva">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="clienteCPF">CPF</label>
                            <input type="text" id="clienteCPF" name="cpf" class="form-control" required placeholder="000.000.000-00">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label" for="clienteEmail">E-mail</label>
                            <input type="email" id="clienteEmail" name="email" class="form-control" required placeholder="joao@email.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="clienteTelefone">Telefone</label>
                            <input type="text" id="clienteTelefone" name="telefone" class="form-control" required placeholder="(00) 00000-0000">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="clienteEndereco">Endereço Completo</label>
                        <input type="text" id="clienteEndereco" name="endereco" class="form-control" required placeholder="Rua, Número, Bairro, Cidade">
                    </div>
                    <div class="d-flex justify-content-end">
                        <button type="reset" class="btn btn-secondary-custom me-2">Limpar</button>
                        <button type="submit" class="btn btn-custom">Salvar Cliente</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
